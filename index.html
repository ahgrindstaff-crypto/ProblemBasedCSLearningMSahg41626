<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code + Human Framework</title>
    <style>
        :root {
            --bg-dark: #0F172A;
            --bg-card: #1E293B;
            --accent: #F59E0B;
            --text-main: #E2E8F0;
            --text-muted: #94A3B8;
            --code-bg: #0D1117;
        }

        body {
            font-family: 'Georgia', serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            line-height: 1.6;
        }

        header {
            background: linear-gradient(135deg, #1E293B 0%, #0F172A 100%);
            border-bottom: 3px solid var(--accent);
            padding: 32px 40px 24px;
        }

        .eyebrow {
            font-size: 11px;
            letter-spacing: 4px;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 8px;
            font-family: 'Courier New', monospace;
        }

        h1 {
            font-size: clamp(24px, 4vw, 42px);
            font-weight: 900;
            margin: 0 0 8px;
            color: #F8FAFC;
            letter-spacing: -1px;
            line-height: 1.1;
        }

        .subtitle {
            margin: 0;
            color: var(--text-muted);
            font-size: 16px;
            font-style: italic;
        }

        .tab-nav {
            display: flex;
            border-bottom: 1px solid #1E293B;
            background: var(--bg-dark);
            padding: 0 40px;
            gap: 4px;
        }

        .tab-btn {
            background: none;
            border: none;
            padding: 16px 20px 14px;
            cursor: pointer;
            font-size: 13px;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #475569;
            border-bottom: 3px solid transparent;
            transition: all 0.2s;
        }

        .tab-btn.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .container {
            padding: 40px;
            max-width: 900px;
            margin: 0 auto;
        }

        .content-section {
            display: none;
        }

        .content-section.active {
            display: block;
        }

        .intro-text {
            color: var(--text-muted);
            font-size: 17px;
            margin: 0 0 40px;
            font-style: italic;
            border-left: 4px solid var(--accent);
            padding-left: 20px;
        }

        .phase-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 24px 28px;
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: 80px 1fr;
            gap: 20px;
            align-items: start;
        }

        .phase-num {
            text-align: center;
            font-family: 'Courier New', monospace;
        }

        .example-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }

        .ex-btn {
            background: var(--bg-card);
            border: 2px solid #334155;
            border-radius: 10px;
            padding: 12px 20px;
            cursor: pointer;
            color: #64748B;
            font-family: 'Courier New', monospace;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ex-btn.active {
            background: #1E3A5F;
            border-color: #3B82F6;
            color: #93C5FD;
        }

        .code-container {
            background: var(--code-bg);
            border-radius: 12px;
            border: 1px solid #21262D;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            margin-top: 20px;
        }

        .code-header {
            background: #161B22;
            padding: 12px 20px;
            border-bottom: 1px solid #21262D;
        }

        pre {
            margin: 0;
            padding: 24px;
            font-size: 13px;
            overflow-x: auto;
            white-space: pre-wrap;
            color: #E6EDF3;
            /* FORCES STUDENTS TO TYPE MANUALLY */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        @media (max-width: 600px) {
            .grid-2 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <div class="eyebrow">Middle School CS · Problem Solving Framework</div>
        <h1>Code + Human</h1>
        <p class="subtitle">Code solves a piece. You solve the rest.</p>
    </header>

    <nav class="tab-nav">
        <button class="tab-btn active" onclick="switchTab('framework')">The Framework</button>
        <button class="tab-btn" onclick="switchTab('examples')">Example Projects</button>
    </nav>

    <div class="container">
        <section id="framework" class="content-section active">
            <p class="intro-text">
                Real problems are too big and too human for code alone. Decomposing a problem allows us to see where a tool can simplify a task and where our own judgment is required.
            </p>
            <div id="phases-list"></div>
        </section>

        <section id="examples" class="content-section">
            <div class="example-selector" id="example-btns"></div>
            <div id="example-content"></div>
        </section>
    </div>

    <script>
        const PHASES = [
            { number: "01", label: "NOTICE", color: "#F59E0B", question: "What real problem do you see?", tip: "Identify the frustration or fear." },
            { number: "02", label: "NARROW", color: "#10B981", question: "What ONE small thing can code track?", tip: "Code is great for tracking levels and steps." },
            { number: "03", label: "BUILD", color: "#3B82F6", question: "Write the logic.", tip: "Focus on the calculation or comparison." },
            { number: "04", label: "TEST", color: "#8B5CF6", question: "Check the results.", tip: "Does the code flag the right state?" },
            { number: "05", label: "REFLECT", color: "#EF4444", question: "Where is the Human?", tip: "The human provides the courage and the context." }
        ];

        const EXAMPLES = [
            {
                id: "spiders", emoji: "🕷️", title: "Arachnophobia Exposure Tracker",
                realProblem: "Overcoming fear requires a counselor-approved 3-step ladder: 1. Picture, 2. Video, 3. Captivity.",
                codeHandles: "Tracks which of the 3 exposure steps you are on and checks if your calmness score is high enough to advance.",
                humanHandles: "Actually looking at the spider, practicing controlled breathing, and deciding when you feel safe enough to try.",
                concept: "If/Else Statements + Comparison",
                code: `// ARACHNOPHOBIA TRACKER (Counselor Method)
// Logic handles the ladder — you provide the courage.

function trackExposure(stepNumber, calmScore) {
  // Step 1: Look at a Picture
  // Step 2: Watch a Video
  // Step 3: See a Spider in Captivity

  console.log("Current Step: " + stepNumber);
  console.log("Calmness Level (1-10): " + calmScore);

  if (calmScore >= 8) {
    console.log("✅ Code Result: You are very calm. Move to next step?");
  } else if (calmScore >= 5) {
    console.log("⚖️ Code Result: Stay here a bit longer. Keep breathing.");
  } else {
    console.log("🛑 Code Result: High stress detected. Stop and look away.");
  }
}

// TEST IT: Try Step 1 with a calmScore of 9
trackExposure(1, 9);`
            },
            {
                id: "homework", emoji: "📚", title: "Homework Sprint Tracker",
                realProblem: "Assignments pile up. Success requires reviewing due dates, prioritizing, and working in 20-minute sprints.",
                codeHandles: "Sorts your list by due date and manages a 20-minute timer for your current priority task.",
                humanHandles: "Deciding which priority to focus on and choosing to finish an assignment if it is almost done.",
                concept: "Arrays + Object Sorting + Logic",
                code: `// HOMEWORK PRIORITIZER (Teacher Method)
// Code manages the list — you manage the focus.

function startHomeworkSession(assignments) {
  // 1. Sort assignments to see what is due first
  assignments.sort((a, b) => a.daysLeft - b.daysLeft);
  
  let currentTask = assignments[0];
  console.log("Next Priority: " + currentTask.subject);

  // 2. Sprint Timer (20 minutes)
  console.log("⏰ 20-minute timer started for " + currentTask.subject);

  // 3. Human decision point
  if (currentTask.percentDone > 85) {
    console.log("💡 Suggestion: You are close! Finish this now.");
  } else {
    console.log("💡 Suggestion: Complete one 20min sprint, then repeat.");
  }
}

let myWork = [
  { subject: "Math", daysLeft: 3, percentDone: 10 },
  { subject: "ELA",  daysLeft: 1, percentDone: 90 }
];

startHomeworkSession(myWork);`
            }
        ];

        function renderPhases() {
            const list = document.getElementById('phases-list');
            list.innerHTML = PHASES.map(p => `
                <div class="phase-card" style="border-left: 5px solid ${p.color}">
                    <div class="phase-num">
                        <div style="font-size: 28px; font-weight: 900; color: ${p.color}">${p.number}</div>
                        <div style="font-size: 10px; color: ${p.color}">${p.label}</div>
                    </div>
                    <div>
                        <div style="font-size: 18px; font-weight: 700; margin-bottom: 10px;">${p.question}</div>
                        <div style="font-size: 14px; color: var(--text-muted); font-style: italic;">💡 ${p.tip}</div>
                    </div>
                </div>
            `).join('');
        }

        function switchTab(tabId) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function showExample(exId) {
            const ex = EXAMPLES.find(e => e.id === exId);
            const container = document.getElementById('example-content');
            document.querySelectorAll('.ex-btn').forEach(b => b.classList.toggle('active', b.dataset.id === exId));

            container.innerHTML = `
                <div style="background: var(--bg-card); border-radius: 12px; padding: 28px; margin-bottom: 20px;">
                    <h2 style="margin: 0 0 20px; display: flex; align-items: center; gap: 12px;">
                        <span>${ex.emoji}</span> ${ex.title}
                    </h2>
                    <div style="background: var(--bg-dark); padding: 16px; border-left: 4px solid #94A3B8; margin-bottom: 16px;">
                        <div class="eyebrow" style="font-size: 10px;">Real Problem</div>
                        <div>${ex.realProblem}</div>
                    </div>
                    <div class="grid-2">
                        <div style="background: var(--bg-dark); padding: 16px; border-left: 4px solid #3B82F6;">
                            <div class="eyebrow" style="font-size: 10px; color: #3B82F6;">💻 Code Handles</div>
                            <div style="font-size: 14px;">${ex.codeHandles}</div>
                        </div>
                        <div style="background: var(--bg-dark); padding: 16px; border-left: 4px solid var(--accent);">
                            <div class="eyebrow" style="font-size: 10px; color: var(--accent);">🤝 Human Handles</div>
                            <div style="font-size: 14px;">${ex.humanHandles}</div>
                        </div>
                    </div>
                </div>
                <div class="code-container">
                    <div class="code-header">
                        <span style="color: #8B949E; font-size: 13px;">starter.js · ${ex.concept}</span>
                    </div>
                    <pre><code>${ex.code}</code></pre>
                </div>
            `;
        }

        renderPhases();
        const exBtns = document.getElementById('example-btns');
        exBtns.innerHTML = EXAMPLES.map(e => `
            <button class="ex-btn" data-id="${e.id}" onclick="showExample('${e.id}')">
                <span>${e.emoji}</span> ${e.title}
            </button>
        `).join('');
        showExample('spiders');
    </script>
</body>
</html>
